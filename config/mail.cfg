[mail]
install_path: {{ .AppDir }}
bin_dir: %(install_path)s/bin
psql = %(install_path)s/postgresql/bin/psql.sh
db_socket: {{ .DbPsqlPath }}
postfix_main_config_file: {{ .AppDataDir }}/config/postfix/main.cf
roundcube_config_file_template: %(install_path)s/config.template/roundcube/config.inc.php
roundcube_config_file: {{ .AppDataDir }}/config/roundcube/config.inc.php
dovecot_config_file: {{ .AppDataDir }}/config/dovecot/dovecot.conf
db_init_file: %(install_path)s/roundcubemail/SQL/postgres.initial.sql
php_ini: {{ .AppDataDir }}/config/php/php.ini
