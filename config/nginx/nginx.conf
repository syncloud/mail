worker_processes 4;
pid {{ .AppDataDir }}/log/nginx.pid;
error_log syslog:server=unix:/dev/log warn;

daemon off;

events {
    worker_connections  1024;
}

http {

    include {{ .AppDir }}/nginx/etc/nginx/mime.types;

    client_body_temp_path {{ .AppDataDir }}/nginx/client_body_temp;
    proxy_temp_path {{ .AppDataDir }}/nginx/proxy_temp;
    fastcgi_temp_path {{ .AppDataDir }}/nginx/fastcgi_temp;
    uwsgi_temp_path {{ .AppDataDir }}/nginx/puwsgi_temp;
    scgi_temp_path {{ .AppDataDir }}/nginx/scgi_temp;
    
    server {
        listen unix:{{ .AppDataDir }}/web.socket;
        server_name localhost;

        access_log syslog:server=unix:/dev/log ;
        root {{ .AppDir }}/roundcubemail;
        index index.php index.html index.htm;
        client_max_body_size 100M;
	
        location / {
            try_files $uri $uri/ /index.php?q=$uri&$args;
        }

        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root {{ .AppDir }}/nginx/usr/share/nginx/html;
        }

        location ~ ^/(README.md|INSTALL|LICENSE|CHANGELOG|UPGRADING)$ {
            deny all;
        }

        location ~ ^/(config|temp|logs)/ {
            deny all;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass unix:{{ .AppDataDir }}/log/php5-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }
}
