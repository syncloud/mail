apps:
  postfix:
    command: bin/service.postfix.sh start
    stop-command: bin/service.postfix.sh stop
    daemon: forking
    plugs:
    - network
    - network-bind
    restart-condition: always
    before: [php-fpm]
  dovecot:
    command: bin/service.dovecot.sh start
    daemon: simple
    plugs:
    - network
    - network-bind
    restart-condition: always
    before: [php-fpm]
  postgresql:
    user: mail
    command: bin/service.postgresql.sh start
    daemon: forking
    plugs:
    - network
    - network-bind
    restart-condition: always
    before: [php-fpm]
  php-fpm:
    user: mail
    command: bin/service.php-fpm.sh start
    daemon: forking
    plugs:
    - network
    - network-bind
    restart-condition: always
    post-start-command: bin/service.php-fpm.sh post-start
    after: [postgresql]
    before: [nginx]
  opendkim:
    user: mail
    command: bin/service.opendkim.sh start
    daemon: forking
    plugs:
    - network
    - network-bind
    restart-condition: always
    after: [postgresql]
    before: [nginx]
  nginx:
    command: bin/service.nginx.sh
    user: mail
    daemon: simple
    plugs:
    - network
    - network-bind
    restart-condition: always

  storage-change:
    command: bin/cli storage-change

  access-change:
    command: bin/cli access-change

  certificate-change:
    command: bin/cli certificate-change

confinement: strict
description: Mail with Web interface and compatible with popular mail apps
grade: stable
name: mail
summary: Mail server
